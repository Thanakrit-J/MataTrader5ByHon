version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: mt5_trading_db
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: BotPassword123
      POSTGRES_DB: mt5_trading
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: